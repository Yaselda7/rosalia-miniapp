<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #120808; }
  iframe { width: 100%; height: 100vh; border: none; }
</style>
</head>
<body>
<script>
const iframe = document.createElement('iframe');
iframe.src = 'landing-app.html';
iframe.onload = function() {
  const style = iframe.contentDocument.createElement('style');
  style.textContent = `
    :root {
      --bg: #120808 !important;
      --fg: #F0E6E6 !important;
      --card: #1F0F0F !important;
      --secondary: #1F0F0F !important;
      --secondary-fg: #F0E6E6 !important;
      --muted-fg: #C4A8A8 !important;
      --muted: rgba(207,167,165,.08) !important;
      --border: rgba(207,167,165,.2) !important;
    }
  `;
  iframe.contentDocument.head.appendChild(style);
};
document.body.appendChild(iframe);
</script>
</body>
</html>
